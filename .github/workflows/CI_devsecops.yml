# ----------------------------------------------------------------------------
# CI DevSecOps Workflow
# This workflow integrates CI testing plus DevSecOps controls:
# - SAST with Semgrep
# - SCA and Security IaC with Trivy
# - DAST with OWASP ZAP
# - Vulnerability management with DefectDojo (optional via secrets)
# ----------------------------------------------------------------------------

name: CI DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  PYTHON_VERSION: '3.12'
  MARIADB_ROOT_PASSWORD: uvlhub_root_password
  MARIADB_DATABASE: uvlhubdb_test
  MARIADB_TEST_DATABASE: uvlhubdb_test
  MARIADB_USER: uvlhub_user
  MARIADB_PASSWORD: uvlhub_password
  MARIADB_HOSTNAME: 127.0.0.1
  MARIADB_PORT: 3306
  FLASK_ENV: testing

jobs:
  ci_tests:
    name: CI - Pytest
    runs-on: ubuntu-24.04

    services:
      mariadb:
        image: mariadb:12.0.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ env.MARIADB_DATABASE }}
          MARIADB_USER: ${{ env.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ env.MARIADB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -u root -p$MARIADB_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Delete rosemary editable mode
        run: sed -i '/rosemary @ file:\/\/\/app/d' requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26" "setuptools<81" wheel
          pip install --no-build-isolation -r requirements.txt

      - name: Run tests
        run: pytest app/modules/ --ignore-glob='*selenium*'

  sast_semgrep:
    name: Security - SAST (Semgrep)
    runs-on: ubuntu-24.04
    needs: ci_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --json \
            --output reports/semgrep.json \
            app core rosemary || true

      - name: Parse Semgrep report
        id: semgrep_parse
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          report = Path("reports/semgrep.json")
          if not report.exists():
              print("Semgrep report not found.")
              sys.exit(1)

          data = json.loads(report.read_text(encoding="utf-8"))
          findings = data.get("results", [])
          error_count = 0
          warning_count = 0

          for finding in findings:
              severity = str(finding.get("extra", {}).get("severity", "")).upper()
              if severity == "ERROR":
                  error_count += 1
              elif severity == "WARNING":
                  warning_count += 1

          print(
              f"Semgrep findings -> ERROR: {error_count}, WARNING: {warning_count}, TOTAL: {len(findings)}"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"error_count={error_count}\n")
              output.write(f"warning_count={warning_count}\n")
              output.write(f"total_count={len(findings)}\n")
          PY

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-security-report
          path: reports/semgrep.json
          if-no-files-found: warn
          retention-days: 14

      - name: Security gate - Semgrep
        run: |
          if [ "${{ steps.semgrep_parse.outputs.error_count }}" -gt 0 ]; then
            echo "Semgrep: Tienes ${{ steps.semgrep_parse.outputs.error_count }} vulnerabilidades encontradas de categoría Critical/High"
          fi

  sca_iac_trivy:
    name: Security - SCA and IaC (Trivy)
    runs-on: ubuntu-24.04
    needs: ci_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Trivy filesystem scan (dependencies and secrets)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: reports/trivy-fs.json
          exit-code: '0'

      - name: Run Trivy config scan (Security IaC)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: json
          output: reports/trivy-config.json
          exit-code: '0'

      - name: Parse Trivy reports
        id: trivy_parse
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          fs_report = Path("reports/trivy-fs.json")
          config_report = Path("reports/trivy-config.json")

          missing_reports = [str(p) for p in (fs_report, config_report) if not p.exists()]
          if missing_reports:
              print(f"Missing Trivy reports: {', '.join(missing_reports)}")
              sys.exit(1)

          def count_findings(report_path):
              data = json.loads(report_path.read_text(encoding="utf-8"))
              vuln_count = 0
              misconfig_count = 0
              secret_count = 0

              for result in data.get("Results", []):
                  for vuln in result.get("Vulnerabilities") or []:
                      if str(vuln.get("Severity", "")).upper() in {"HIGH", "CRITICAL"}:
                          vuln_count += 1

                  for misconfig in result.get("Misconfigurations") or []:
                      if str(misconfig.get("Severity", "")).upper() in {"HIGH", "CRITICAL"}:
                          misconfig_count += 1

                  for secret in result.get("Secrets") or []:
                      severity = str(secret.get("Severity", "")).upper()
                      if severity in {"HIGH", "CRITICAL"} or not severity:
                          secret_count += 1

              return vuln_count, misconfig_count, secret_count

          fs_vuln, fs_mis, fs_secret = count_findings(fs_report)
          cfg_vuln, cfg_mis, cfg_secret = count_findings(config_report)

          vuln_total = fs_vuln + cfg_vuln
          misconfig_total = fs_mis + cfg_mis
          secret_total = fs_secret + cfg_secret
          total = vuln_total + misconfig_total + secret_total

          print(
              "Trivy findings -> "
              f"Vulnerabilities: {vuln_total}, "
              f"Misconfigurations: {misconfig_total}, "
              f"Secrets: {secret_total}, "
              f"TOTAL: {total}"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"vulnerability_count={vuln_total}\n")
              output.write(f"misconfig_count={misconfig_total}\n")
              output.write(f"secret_count={secret_total}\n")
              output.write(f"total_count={total}\n")
          PY

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: |
            reports/trivy-fs.json
            reports/trivy-config.json
          if-no-files-found: warn
          retention-days: 14

      - name: Security gate - Trivy
        run: |
          if [ "${{ steps.trivy_parse.outputs.total_count }}" -gt 0 ]; then
            echo "Trivy: Tienes ${{ steps.trivy_parse.outputs.total_count }} vulnerabilidades encontradas de categoría Critical/High"
          fi

  dast_owasp_zap:
    name: Security - DAST (OWASP ZAP)
    runs-on: ubuntu-24.04
    needs: ci_tests

    services:
      mariadb:
        image: mariadb:12.0.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ env.MARIADB_DATABASE }}
          MARIADB_USER: ${{ env.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ env.MARIADB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -u root -p$MARIADB_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Delete rosemary editable mode
        run: sed -i '/rosemary @ file:\/\/\/app/d' requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26" "setuptools<81" wheel
          pip install --no-build-isolation -r requirements.txt

      - name: Start app for DAST scan
        env:
          FLASK_APP: app:app
          FLASK_ENV: development
        run: |
          mkdir -p reports
          flask db upgrade
          nohup flask run --host=127.0.0.1 --port=5000 > reports/flask-zap.log 2>&1 &
          echo "FLASK_PID=$!" >> "$GITHUB_ENV"

          for i in {1..60}; do
            if curl --silent --fail http://127.0.0.1:5000/ > /dev/null; then
              echo "Application is up for ZAP scan."
              break
            fi
            sleep 2
          done

          curl --silent --fail http://127.0.0.1:5000/ > /dev/null

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:5000'
          fail_action: false
          allow_issue_writing: false
          cmd_options: >-
            -J zap-report.json
            -r zap-report.html
            -w zap-report.md
            -x zap-report.xml
            -m 5

      - name: Parse ZAP report
        id: zap_parse
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          report = Path("zap-report.json")
          if not report.exists():
              print("ZAP report not found.")
              sys.exit(1)

          data = json.loads(report.read_text(encoding="utf-8"))
          sites = data.get("site", [])
          if isinstance(sites, dict):
              sites = [sites]

          totals = {"3": 0, "2": 0, "1": 0, "0": 0}

          for site in sites:
              for alert in site.get("alerts", []):
                  risk_code = str(alert.get("riskcode", "")).strip()
                  count_raw = str(alert.get("count", "0")).strip()
                  try:
                      count = int(count_raw)
                  except ValueError:
                      count = 1

                  if risk_code in totals:
                      totals[risk_code] += count

          high_count = totals["3"]
          medium_count = totals["2"]
          low_count = totals["1"]
          info_count = totals["0"]

          print(
              f"ZAP alerts -> HIGH: {high_count}, MEDIUM: {medium_count}, "
              f"LOW: {low_count}, INFO: {info_count}"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"high_count={high_count}\n")
              output.write(f"medium_count={medium_count}\n")
              output.write(f"low_count={low_count}\n")
              output.write(f"info_count={info_count}\n")
          PY

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            zap-report.json
            zap-report.html
            zap-report.md
            zap-report.xml
            reports/flask-zap.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop Flask app
        if: always()
        run: |
          if [ -n "${FLASK_PID:-}" ]; then
            kill "$FLASK_PID" || true
          fi

      - name: Security gate - ZAP
        run: |
          if [ "${{ steps.zap_parse.outputs.high_count }}" -gt 0 ]; then
            echo "ZAP: Tienes ${{ steps.zap_parse.outputs.high_count }} vulnerabilidades encontradas de categoría Critical/High"
          fi

  vulnerability_management:
    name: Vulnerability Management - DefectDojo
    runs-on: ubuntu-24.04
    needs: [sast_semgrep, sca_iac_trivy, dast_owasp_zap]
    if: always()
    env:
      DEFECTDOJO_URL: ${{ secrets['DEFECTDOJO_URL'] }}
      DEFECTDOJO_API_TOKEN: ${{ secrets['DEFECTDOJO_API_TOKEN'] }}
      DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets['DEFECTDOJO_ENGAGEMENT_ID'] }}

    steps:
      - name: Download security artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: '*-security-report'
          path: aggregated-reports
          merge-multiple: false

      - name: Show collected reports
        run: |
          echo "Collected reports for vulnerability management:"
          if [ -d aggregated-reports ]; then
            find aggregated-reports -type f | sort
          else
            echo "No reports were collected."
          fi

      - name: DefectDojo preflight context
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          if [ -n "${DEFECTDOJO_URL:-}" ]; then
            echo "DEFECTDOJO_URL configured: yes"
          else
            echo "DEFECTDOJO_URL configured: no"
          fi

          if [ -n "${DEFECTDOJO_API_TOKEN:-}" ]; then
            echo "DEFECTDOJO_API_TOKEN configured: yes"
          else
            echo "DEFECTDOJO_API_TOKEN configured: no"
          fi

          if [ -n "${DEFECTDOJO_ENGAGEMENT_ID:-}" ]; then
            echo "DEFECTDOJO_ENGAGEMENT_ID configured: yes"
          else
            echo "DEFECTDOJO_ENGAGEMENT_ID configured: no"
          fi

      - name: Validate DefectDojo API access
        if: env.DEFECTDOJO_URL != '' && env.DEFECTDOJO_API_TOKEN != '' && env.DEFECTDOJO_ENGAGEMENT_ID != ''
        run: |
          set -euo pipefail

          if ! [[ "$DEFECTDOJO_ENGAGEMENT_ID" =~ ^[0-9]+$ ]]; then
            echo "DEFECTDOJO_ENGAGEMENT_ID must be numeric. Current value is not a valid integer."
            exit 1
          fi

          url="${DEFECTDOJO_URL%/}/api/v2/engagements/${DEFECTDOJO_ENGAGEMENT_ID}/"
          echo "Checking DefectDojo engagement endpoint: $url"

          http_code=$(curl --silent --show-error \
            -o /tmp/dd-engagement-response.json \
            -w "%{http_code}" \
            -H "Authorization: Token ${DEFECTDOJO_API_TOKEN}" \
            "$url")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "DefectDojo API preflight failed with HTTP $http_code"
            cat /tmp/dd-engagement-response.json || true
            exit 1
          fi

          echo "DefectDojo API preflight OK (HTTP $http_code)"

      - name: Import findings into DefectDojo
        if: env.DEFECTDOJO_URL != '' && env.DEFECTDOJO_API_TOKEN != '' && env.DEFECTDOJO_ENGAGEMENT_ID != ''
        run: |
          set -euo pipefail

          uploaded_count=0

          upload_scan() {
            local report_path="$1"
            local scan_type="$2"

            if [ ! -f "$report_path" ]; then
              echo "Skipping missing report: $report_path"
              return 0
            fi

            echo "Uploading $report_path as '$scan_type'"
            http_code=$(curl --silent --show-error \
              -o /tmp/dd-upload-response.json \
              -w "%{http_code}" \
              -X POST "${DEFECTDOJO_URL%/}/api/v2/import-scan/" \
              -H "Authorization: Token ${DEFECTDOJO_API_TOKEN}" \
              -F "engagement=${DEFECTDOJO_ENGAGEMENT_ID}" \
              -F "scan_type=${scan_type}" \
              -F "minimum_severity=Low" \
              -F "active=true" \
              -F "verified=false" \
              -F "close_old_findings=false" \
              -F "scan_date=$(date +%F)" \
              -F "file=@${report_path}")

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "Failed uploading $report_path (scan_type='$scan_type'). HTTP $http_code"
              cat /tmp/dd-upload-response.json || true
              return 1
            fi

            echo "Upload successful for $report_path (HTTP $http_code)"
            uploaded_count=$((uploaded_count + 1))
          }

          upload_scan "aggregated-reports/semgrep-security-report/semgrep.json" "Semgrep JSON Report"
          upload_scan "aggregated-reports/trivy-security-report/trivy-fs.json" "Trivy Scan"
          upload_scan "aggregated-reports/trivy-security-report/trivy-config.json" "Trivy Scan"
          upload_scan "aggregated-reports/zap-security-report/zap-report.xml" "ZAP Scan"

          if [ "$uploaded_count" -eq 0 ]; then
            echo "No reports were uploaded to DefectDojo."
            exit 1
          fi

          echo "Total reports uploaded to DefectDojo: $uploaded_count"

      - name: DefectDojo not configured
        if: env.DEFECTDOJO_URL == '' || env.DEFECTDOJO_API_TOKEN == '' || env.DEFECTDOJO_ENGAGEMENT_ID == ''
        run: |
          echo "DefectDojo integration skipped. Configure these secrets to enable it:"
          echo "- DEFECTDOJO_URL"
          echo "- DEFECTDOJO_API_TOKEN"
          echo "- DEFECTDOJO_ENGAGEMENT_ID"

      - name: Upload consolidated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-security-reports
          path: aggregated-reports
          if-no-files-found: warn
          retention-days: 14